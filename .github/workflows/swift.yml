name: Swift CI & Release

on:
  push:
    branches: [ "main" ]
    tags: [ "V*" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: macos-14

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v6

    - name: Run Tests
      run: swift test --verbose

    - name: Compile Standalone Release App and DMG
      run: |
        chmod +x ./scripts/build.sh
        ./scripts/build.sh

    - name: Automatically Create Release and Upload DMG
      if: startsWith(github.ref, 'refs/tags/V')
      uses: softprops/action-gh-release@v2
      with:
        files: PathDeck.dmg
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
